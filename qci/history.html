<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCI PB - ข้อมูลย้อนหลัง</title>
<style>
  :root {
    --navy: #10233d;
    --navy-2: #16304f;
    --gold: #c9a227;
    --gold-soft: #e8d48a;
    --surface-0: #f2efe8;
    --surface-1: #fbfaf7;
    --surface-2: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #918f86;
    --border: #e5e1d6;
    --radius: 8px;
    --radius-lg: 18px;
    --mono: "SF Mono", "Cascadia Mono", Consolas, monospace;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", "Noto Sans Thai", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface-0); color: var(--text-primary); padding: 1rem; -webkit-font-smoothing: antialiased; }
  .app { max-width: 480px; margin: 0 auto; }

  .header {
    display: flex; align-items: center; gap: 12px;
    background: var(--navy); border-radius: var(--radius-lg);
    padding: 14px 16px; margin-bottom: 14px;
    background-image: linear-gradient(180deg, var(--navy-2), var(--navy));
  }
  .back-btn {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px;
    background: rgba(255,255,255,0.08); color: var(--gold-soft);
    text-decoration: none; flex-shrink: 0;
  }
  .header-text p { margin: 0; }
  .page-title { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
  .page-sub { font-size: 10px; color: var(--gold-soft); letter-spacing: 0.8px; text-transform: uppercase; }

  .card-white { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.1rem; margin-bottom: 14px; }
  .section-title {
    font-size: 11px; font-weight: 600; margin: 0 0 10px;
    letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .section-title::before { content: ""; width: 3px; height: 12px; background: var(--gold); display: inline-block; border-radius: 1px; }

  .range-btns { display: flex; gap: 6px; margin-bottom: 12px; }
  .range-btn { font-size: 10.5px; padding: 5px 11px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; letter-spacing: 0.2px; }
  .range-btn.active { background: var(--navy); color: var(--gold-soft); border-color: var(--navy); }

  .empty-note { font-size: 12px; color: var(--text-muted); text-align: center; padding: 20px 0; }

  table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: var(--mono); }
  th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 7px 5px; border-bottom: 0.5px solid var(--border); white-space: nowrap; font-family: -apple-system, sans-serif; letter-spacing: 0.3px; text-transform: uppercase; font-size: 9.5px; }
  td { padding: 7px 5px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  .table-wrap { overflow-x: auto; }

  .legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-secondary); letter-spacing: 0.2px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .footer {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding-top: 4px; font-size: 10.5px; color: var(--text-muted); letter-spacing: 0.3px;
  }

  @media (min-width: 700px) { .app { max-width: 760px; } }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <a class="back-btn" href="index.html" aria-label="กลับหน้าหลัก">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div class="header-text">
      <p class="page-title">ข้อมูลย้อนหลัง</p>
      <p class="page-sub">QCI PB · Steam Boiler</p>
    </div>
  </div>

  <div class="card-white">
    <p class="section-title">แนวโน้มแรงดันไอน้ำ</p>
    <div class="range-btns">
      <button class="range-btn active" data-mode="raw" data-limit="2880">24 ชม.</button>
      <button class="range-btn" data-mode="agg" data-limit="168">7 วัน</button>
      <button class="range-btn" data-mode="agg" data-limit="720">30 วัน</button>
    </div>
    <svg id="pressureChart" width="100%" height="160" viewBox="0 0 700 160"></svg>
    <div class="legend" id="pressureLegend" style="display:none;">
      <span class="legend-item"><span class="legend-dot" style="background:#c9a227"></span>ค่าเฉลี่ย</span>
      <span class="legend-item"><span class="legend-dot" style="background:#c9a227;opacity:0.3"></span>ช่วงต่ำสุด–สูงสุด</span>
    </div>
  </div>

  <div class="card-white">
    <p class="section-title">แนวโน้มอุณหภูมิ</p>
    <svg id="tempChart" width="100%" height="160" viewBox="0 0 700 160"></svg>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#16304f"></span>น้ำเข้า ECO</span>
      <span class="legend-item"><span class="legend-dot" style="background:#a32d2d"></span>น้ำออก ECO</span>
      <span class="legend-item"><span class="legend-dot" style="background:#c9a227"></span>ไอเสียเข้า ECO</span>
      <span class="legend-item"><span class="legend-dot" style="background:#3b6d11"></span>ปล่องควัน</span>
    </div>
  </div>

  <div class="card-white">
    <p class="section-title">ตารางข้อมูล</p>
    <div class="table-wrap" id="tableWrap">
      <p class="empty-note">กำลังโหลด...</p>
    </div>
  </div>

  <div class="footer">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
    Powered by Thanaphon Engineering Co., Ltd.
  </div>

</div>

<script>
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwIg7zn9siwqZQ1-j-50YUtYZh0ZsWLBO4s318H2UH3hI0qnuNfMpY1fmYsSpnsvea1/exec"
};

function polyline(values, w, h, padL, padR, padT, padB) {
  if (values.length < 2) return "";
  const min = Math.min.apply(null, values), max = Math.max.apply(null, values);
  const range = (max - min) || 1;
  const step = (w - padL - padR) / (values.length - 1);
  return values.map(function(v, i) {
    const x = padL + i * step;
    const y = h - padB - ((v - min) / range) * (h - padT - padB);
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
}

function renderPressureChart(records) {
  const svg = document.getElementById("pressureChart");
  const values = records.map(function(r) { return Number(r.streamPressure) || 0; });
  if (values.length < 2) {
    svg.innerHTML = '<text x="350" y="80" text-anchor="middle" font-size="12" fill="#918f86">ยังไม่มีข้อมูลย้อนหลังเพียงพอ</text>';
    return;
  }

  const hasMinMax = records[0].streamPressure_min !== undefined && records[0].streamPressure_min !== "";
  const minValues = hasMinMax ? records.map(function(r) { return Number(r.streamPressure_min) || 0; }) : null;
  const maxValues = hasMinMax ? records.map(function(r) { return Number(r.streamPressure_max) || 0; }) : null;

  const allForScale = hasMinMax ? values.concat(minValues, maxValues) : values;
  const w = 700, h = 160, padL = 10, padR = 10, padT = 15, padB = 20;
  const min = Math.min.apply(null, allForScale), max = Math.max.apply(null, allForScale);
  const range = (max - min) || 1;
  const step = (w - padL - padR) / (values.length - 1);

  function toY(v) { return h - padB - ((v - min) / range) * (h - padT - padB); }
  function toX(i) { return padL + i * step; }

  let bandPath = "";
  if (hasMinMax) {
    const topPts = maxValues.map(function(v, i) { return toX(i).toFixed(1) + "," + toY(v).toFixed(1); });
    const bottomPts = minValues.map(function(v, i) { return toX(i).toFixed(1) + "," + toY(v).toFixed(1); }).reverse();
    bandPath = '<polygon points="' + topPts.concat(bottomPts).join(" ") + '" fill="#c9a227" opacity="0.15"/>';
  }

  const avgPts = values.map(function(v, i) { return toX(i).toFixed(1) + "," + toY(v).toFixed(1); }).join(" ");

  svg.innerHTML =
    '<line x1="0" y1="' + padT + '" x2="700" y2="' + padT + '" stroke="#e5e1d6" stroke-width="0.5"/>' +
    '<line x1="0" y1="' + (h - padB) + '" x2="700" y2="' + (h - padB) + '" stroke="#e5e1d6" stroke-width="0.5"/>' +
    '<text x="0" y="12" font-size="10" fill="#918f86" font-family="monospace">' + max.toFixed(1) + ' bar</text>' +
    '<text x="0" y="155" font-size="10" fill="#918f86" font-family="monospace">' + min.toFixed(1) + ' bar</text>' +
    bandPath +
    '<polyline points="' + avgPts + '" fill="none" stroke="#c9a227" stroke-width="2"/>';

  if (hasMinMax) {
    const legend = document.getElementById("pressureLegend");
    if (legend) legend.style.display = "flex";
  }
}

function renderTempChart(records) {
  const svg = document.getElementById("tempChart");
  const series = {
    waterIn: records.map(function(r) { return Number(r.TempWaterInletEco) || 0; }),
    waterOut: records.map(function(r) { return Number(r.TempWaterOutletEco) || 0; }),
    exhaustIn: records.map(function(r) { return Number(r.TempExhaustInletEco) || 0; }),
    stack: records.map(function(r) { return Number(r.TempExhaustToStack) || 0; })
  };
  if (series.waterIn.length < 2) {
    svg.innerHTML = '<text x="350" y="80" text-anchor="middle" font-size="12" fill="#918f86">ยังไม่มีข้อมูลย้อนหลังเพียงพอ</text>';
    return;
  }
  const all = [].concat(series.waterIn, series.waterOut, series.exhaustIn, series.stack);
  const min = Math.min.apply(null, all), max = Math.max.apply(null, all);

  function scaledPoints(values) {
    const step = 680 / (values.length - 1);
    return values.map(function(v, i) {
      const x = 10 + i * step;
      const range = (max - min) || 1;
      const y = 140 - ((v - min) / range) * 125;
      return x.toFixed(1) + "," + y.toFixed(1);
    }).join(" ");
  }

  svg.innerHTML =
    '<line x1="0" y1="15" x2="700" y2="15" stroke="#e5e1d6" stroke-width="0.5"/>' +
    '<line x1="0" y1="140" x2="700" y2="140" stroke="#e5e1d6" stroke-width="0.5"/>' +
    '<polyline points="' + scaledPoints(series.waterIn) + '" fill="none" stroke="#16304f" stroke-width="1.5"/>' +
    '<polyline points="' + scaledPoints(series.waterOut) + '" fill="none" stroke="#a32d2d" stroke-width="1.5"/>' +
    '<polyline points="' + scaledPoints(series.exhaustIn) + '" fill="none" stroke="#c9a227" stroke-width="1.5"/>' +
    '<polyline points="' + scaledPoints(series.stack) + '" fill="none" stroke="#3b6d11" stroke-width="1.5"/>';
}

function renderTable(records) {
  const wrap = document.getElementById("tableWrap");
  if (records.length === 0) {
    wrap.innerHTML = '<p class="empty-note">ยังไม่มีข้อมูล</p>';
    return;
  }
  const recent = records.slice(-20).reverse();
  let html = '<table><thead><tr><th>เวลา</th><th>แรงดัน</th><th>น้ำเข้า</th><th>น้ำออก</th><th>ไอเสียเข้า</th><th>ปล่อง</th></tr></thead><tbody>';
  recent.forEach(function(r) {
    html += '<tr>' +
      '<td>' + (r.timestamp || '-') + '</td>' +
      '<td>' + (r.streamPressure || '-') + '</td>' +
      '<td>' + (r.TempWaterInletEco || '-') + '</td>' +
      '<td>' + (r.TempWaterOutletEco || '-') + '</td>' +
      '<td>' + (r.TempExhaustInletEco || '-') + '</td>' +
      '<td>' + (r.TempExhaustToStack || '-') + '</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

async function loadHistory(mode, limit) {
  try {
    const action = mode === "agg" ? "history_agg" : "history";
    const url = CONFIG.APPS_SCRIPT_URL + "?action=" + action + "&limit=" + limit;
    const res = await fetch(url, { cache: "no-store" });
    const json = await res.json();
    const records = (json.status === "ok" && json.data) ? json.data : [];
    renderPressureChart(records);
    renderTempChart(records);
    renderTable(records);
  } catch (err) {
    document.getElementById("tableWrap").innerHTML = '<p class="empty-note">โหลดข้อมูลไม่สำเร็จ: ' + err.message + '</p>';
  }
}

document.querySelectorAll(".range-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".range-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    loadHistory(btn.dataset.mode, parseInt(btn.dataset.limit, 10));
  });
});

loadHistory("raw", 2880);
</script>
</body>
</html>
