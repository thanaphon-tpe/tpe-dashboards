<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCI PB - ข้อมูลย้อนหลัง</title>
<style>
  :root {
    --surface-0: #f4f3f0;
    --surface-1: #f1efe9;
    --surface-2: #ffffff;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border: #e3e1da;
    --radius: 8px;
    --radius-lg: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", "Noto Sans Thai", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface-0); color: var(--text-primary); padding: 1rem; -webkit-font-smoothing: antialiased; }
  .app { max-width: 480px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .back-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; background: var(--surface-2); border: 0.5px solid var(--border); cursor: pointer; text-decoration: none; color: var(--text-primary); }
  .page-title { font-size: 16px; font-weight: 600; margin: 0; }
  .card-white { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.1rem; margin-bottom: 14px; }
  .section-title { font-size: 13px; font-weight: 600; margin: 0 0 8px; }
  .range-btns { display: flex; gap: 6px; margin-bottom: 12px; }
  .range-btn { font-size: 11px; padding: 5px 10px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; }
  .range-btn.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  .empty-note { font-size: 12px; color: var(--text-muted); text-align: center; padding: 20px 0; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 6px 4px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  td { padding: 6px 4px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  .table-wrap { overflow-x: auto; }
  .legend { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  @media (min-width: 700px) { .app { max-width: 760px; } }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <a class="back-btn" href="index.html" aria-label="กลับหน้าหลัก">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
    </a>
    <p class="page-title">ข้อมูลย้อนหลัง</p>
  </div>

  <div class="card-white">
    <p class="section-title">แนวโน้มแรงดันไอน้ำ</p>
    <div class="range-btns">
      <button class="range-btn active" data-limit="50">ล่าสุด 50 จุด</button>
      <button class="range-btn" data-limit="200">ล่าสุด 200 จุด</button>
      <button class="range-btn" data-limit="1000">ล่าสุด 1000 จุด</button>
    </div>
    <svg id="pressureChart" width="100%" height="160" viewBox="0 0 700 160"></svg>
  </div>

  <div class="card-white">
    <p class="section-title">แนวโน้มอุณหภูมิ</p>
    <svg id="tempChart" width="100%" height="160" viewBox="0 0 700 160"></svg>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#378ADD"></span>น้ำเข้า ECO</span>
      <span class="legend-item"><span class="legend-dot" style="background:#E24B4A"></span>น้ำออก ECO</span>
      <span class="legend-item"><span class="legend-dot" style="background:#BA7517"></span>ไอเสียเข้า ECO</span>
      <span class="legend-item"><span class="legend-dot" style="background:#639922"></span>ปล่องควัน</span>
    </div>
  </div>

  <div class="card-white">
    <p class="section-title">ตารางข้อมูล</p>
    <div class="table-wrap" id="tableWrap">
      <p class="empty-note">กำลังโหลด...</p>
    </div>
  </div>

</div>

<script>
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwIg7zn9siwqZQ1-j-50YUtYZh0ZsWLBO4s318H2UH3hI0qnuNfMpY1fmYsSpnsvea1/exec"
};

let currentLimit = 50;

function polyline(values, w, h, padL, padR, padT, padB) {
  if (values.length < 2) return "";
  const min = Math.min.apply(null, values), max = Math.max.apply(null, values);
  const range = (max - min) || 1;
  const step = (w - padL - padR) / (values.length - 1);
  return values.map(function(v, i) {
    const x = padL + i * step;
    const y = h - padB - ((v - min) / range) * (h - padT - padB);
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
}

function renderPressureChart(records) {
  const svg = document.getElementById("pressureChart");
  const values = records.map(function(r) { return Number(r.streamPressure) || 0; });
  if (values.length < 2) {
    svg.innerHTML = '<text x="350" y="80" text-anchor="middle" font-size="12" fill="#888780">ยังไม่มีข้อมูลย้อนหลังเพียงพอ</text>';
    return;
  }
  const pts = polyline(values, 700, 160, 10, 10, 15, 20);
  const min = Math.min.apply(null, values).toFixed(1);
  const max = Math.max.apply(null, values).toFixed(1);
  svg.innerHTML =
    '<line x1="0" y1="15" x2="700" y2="15" stroke="#e3e1da" stroke-width="0.5"/>' +
    '<line x1="0" y1="140" x2="700" y2="140" stroke="#e3e1da" stroke-width="0.5"/>' +
    '<text x="0" y="12" font-size="10" fill="#888780">' + max + ' bar</text>' +
    '<text x="0" y="155" font-size="10" fill="#888780">' + min + ' bar</text>' +
    '<polyline points="' + pts + '" fill="none" stroke="#378ADD" stroke-width="2"/>';
}

function renderTempChart(records) {
  const svg = document.getElementById("tempChart");
  const series = {
    waterIn: records.map(function(r) { return Number(r.TempWaterInletEco) || 0; }),
    waterOut: records.map(function(r) { return Number(r.TempWaterOutletEco) || 0; }),
    exhaustIn: records.map(function(r) { return Number(r.TempExhaustInletEco) || 0; }),
    stack: records.map(function(r) { return Number(r.TempExhaustToStack) || 0; })
  };
  if (series.waterIn.length < 2) {
    svg.innerHTML = '<text x="350" y="80" text-anchor="middle" font-size="12" fill="#888780">ยังไม่มีข้อมูลย้อนหลังเพียงพอ</text>';
    return;
  }
  const all = [].concat(series.waterIn, series.waterOut, series.exhaustIn, series.stack);
  const min = Math.min.apply(null, all), max = Math.max.apply(null, all);

  function scaledPoints(values) {
    const step = 680 / (values.length - 1);
    return values.map(function(v, i) {
      const x = 10 + i * step;
      const range = (max - min) || 1;
      const y = 140 - ((v - min) / range) * 125;
      return x.toFixed(1) + "," + y.toFixed(1);
    }).join(" ");
  }

  svg.innerHTML =
    '<line x1="0" y1="15" x2="700" y2="15" stroke="#e3e1da" stroke-width="0.5"/>' +
    '<line x1="0" y1="140" x2="700" y2="140" stroke="#e3e1da" stroke-width="0.5"/>' +
    '<polyline points="' + scaledPoints(series.waterIn) + '" fill="none" stroke="#378ADD" stroke-width="1.5"/>' +
    '<polyline points="' + scaledPoints(series.waterOut) + '" fill="none" stroke="#E24B4A" stroke-width="1.5"/>' +
    '<polyline points="' + scaledPoints(series.exhaustIn) + '" fill="none" stroke="#BA7517" stroke-width="1.5"/>' +
    '<polyline points="' + scaledPoints(series.stack) + '" fill="none" stroke="#639922" stroke-width="1.5"/>';
}

function renderTable(records) {
  const wrap = document.getElementById("tableWrap");
  if (records.length === 0) {
    wrap.innerHTML = '<p class="empty-note">ยังไม่มีข้อมูล</p>';
    return;
  }
  const recent = records.slice(-20).reverse();
  let html = '<table><thead><tr><th>เวลา</th><th>แรงดัน</th><th>น้ำเข้า</th><th>น้ำออก</th><th>ไอเสียเข้า</th><th>ปล่อง</th></tr></thead><tbody>';
  recent.forEach(function(r) {
    html += '<tr>' +
      '<td>' + (r.timestamp || '-') + '</td>' +
      '<td>' + (r.streamPressure || '-') + '</td>' +
      '<td>' + (r.TempWaterInletEco || '-') + '</td>' +
      '<td>' + (r.TempWaterOutletEco || '-') + '</td>' +
      '<td>' + (r.TempExhaustInletEco || '-') + '</td>' +
      '<td>' + (r.TempExhaustToStack || '-') + '</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

async function loadHistory(limit) {
  currentLimit = limit;
  try {
    const url = CONFIG.APPS_SCRIPT_URL + "?action=history&limit=" + limit;
    const res = await fetch(url, { cache: "no-store" });
    const json = await res.json();
    const records = (json.status === "ok" && json.data) ? json.data : [];
    renderPressureChart(records);
    renderTempChart(records);
    renderTable(records);
  } catch (err) {
    document.getElementById("tableWrap").innerHTML = '<p class="empty-note">โหลดข้อมูลไม่สำเร็จ: ' + err.message + '</p>';
  }
}

document.querySelectorAll(".range-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".range-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    loadHistory(parseInt(btn.dataset.limit, 10));
  });
});

loadHistory(currentLimit);
</script>
</body>
</html>
